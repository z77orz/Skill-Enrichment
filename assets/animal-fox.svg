<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 100 100">
  <!-- Body -->
  <ellipse cx="50" cy="62" rx="30" ry="20" fill="#3F5D3A" opacity="0.9"/>
  <!-- Head -->
  <circle cx="72" cy="48" r="18" fill="#3F5D3A"/>
  <!-- Ears (pointy) -->
