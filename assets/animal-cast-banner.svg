<svg xmlns="http://www.w3.org/2000/svg" width="360" height="100" viewBox="0 0 360 100">
  <text x="180" y="20" text-anchor="middle" font-family="'Noto Serif SC',serif" font-size="14" font-weight="700" fill="#3F5D3A">⟐ Field-Guide Cast ⟐</text>
  <!-- Fox at x=20 -->
  <g transform="translate(20, 30) scale(0.5)">
  <!-- Body -->
  <ellipse cx="50" cy="62" rx="30" ry="20" fill="#3F5D3A" opacity="0.9"/>
  <!-- Head -->
  <circle cx="72" cy="48" r="18" fill="#3F5D3A"/>
  <!-- Ears (pointy) -->
  <polygon points="62,32 58,18 72,28" fill="#3F5D3A"/>
  <polygon points="82,32 86,18 76,28" fill="#3F5D3A"/>
  <!-- Snout -->
  <polygon points="86,48 96,52 86,56" fill="#3F5D3A"/>
  <!-- Eye highlight (white) -->
  <circle cx="76" cy="44" r="2" fill="#F4EFE6"/>
  <!-- Tail (curved) -->
  <path d="M 22 60 Q 8 50 12 38 Q 16 30 24 36 Q 22 48 30 56 Z" fill="#3F5D3A" opacity="0.85"/>
  <!-- Legs -->
  <rect x="38" y="78" width="6" height="10" fill="#3F5D3A"/>
  <rect x="56" y="78" width="6" height="10" fill="#3F5D3A"/>
</g>
  <!-- Bird at x=100 -->
  <g transform="translate(100, 30) scale(0.5)">
  <!-- Wings (curved) -->
  <path d="M 10 50 Q 30 30 50 40 Q 60 35 50 50 Z" fill="#3F5D3A"/>
  <path d="M 90 50 Q 70 30 50 40 Q 40 35 50 50 Z" fill="#3F5D3A"/>
  <!-- Body (oval) -->
  <ellipse cx="50" cy="50" rx="20" ry="10" fill="#3F5D3A"/>
  <!-- Head -->
  <circle cx="68" cy="44" r="9" fill="#3F5D3A"/>
  <!-- Beak -->
  <polygon points="76,44 84,46 76,48" fill="#3F5D3A"/>
  <!-- Eye -->
  <circle cx="70" cy="42" r="1.5" fill="#F4EFE6"/>
  <!-- Tail feathers -->
  <polygon points="30,50 12,46 14,52" fill="#3F5D3A"/>
  <polygon points="30,50 10,54 16,58" fill="#3F5D3A"/>
</g>
  <!-- Tree at x=180 -->
  <g transform="translate(180, 30) scale(0.5)">
  <!-- Trunk -->
  <rect x="44" y="50" width="12" height="40" fill="#3F5D3A"/>
  <!-- Roots -->
  <path d="M 44 90 Q 30 92 22 88" stroke="#3F5D3A" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 56 90 Q 70 92 78 88" stroke="#3F5D3A" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Healthy branches (left side) -->
  <path d="M 50 50 Q 30 38 18 30" stroke="#3F5D3A" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 50 55 Q 35 55 24 50" stroke="#3F5D3A" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Leaves cluster -->
  <circle cx="20" cy="28" r="8" fill="#3F5D3A" opacity="0.85"/>
  <circle cx="14" cy="34" r="6" fill="#3F5D3A" opacity="0.85"/>
  <circle cx="28" cy="22" r="5" fill="#3F5D3A" opacity="0.85"/>
  <!-- BROKEN branch (right side - jagged, with X) -->
  <path d="M 50 50 Q 72 40 80 28" stroke="#3F5D3A" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 80 28 L 86 24" stroke="#3F5D3A" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Red ✕ on the break (SkillDefect color #8B2C1F) -->
  <line x1="78" y1="32" x2="84" y2="22" stroke="#8B2C1F" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="78" y1="22" x2="84" y2="32" stroke="#8B2C1F" stroke-width="2.5" stroke-linecap="round"/>
</g>
  <!-- Octopus at x=260 -->
  <g transform="translate(260, 30) scale(0.5)">
  <!-- Head (rounded mantle) -->
  <ellipse cx="50" cy="40" rx="28" ry="22" fill="#3F5D3A"/>
  <!-- Two eye highlights -->
  <circle cx="42" cy="38" r="2.5" fill="#F4EFE6"/>
  <circle cx="58" cy="38" r="2.5" fill="#F4EFE6"/>
  <!-- 8 arms (wavy tentacles) -->
  <path d="M 26 56 Q 14 64 12 78 Q 16 84 22 80 Q 24 70 32 64" fill="none" stroke="#3F5D3A" stroke-width="4" stroke-linecap="round"/>
  <path d="M 30 60 Q 22 76 28 90 Q 34 88 32 78" fill="none" stroke="#3F5D3A" stroke-width="4" stroke-linecap="round"/>
  <path d="M 38 62 Q 36 78 40 92" fill="none" stroke="#3F5D3A" stroke-width="4" stroke-linecap="round"/>
  <path d="M 46 64 Q 48 80 50 92" fill="none" stroke="#3F5D3A" stroke-width="4" stroke-linecap="round"/>
  <path d="M 54 64 Q 52 80 50 92" fill="none" stroke="#3F5D3A" stroke-width="4" stroke-linecap="round"/>
  <path d="M 62 62 Q 64 78 60 92" fill="none" stroke="#3F5D3A" stroke-width="4" stroke-linecap="round"/>
  <path d="M 70 60 Q 78 76 72 90 Q 66 88 68 78" fill="none" stroke="#3F5D3A" stroke-width="4" stroke-linecap="round"/>
  <path d="M 74 56 Q 86 64 88 78 Q 84 84 78 80 Q 76 70 68 64" fill="none" stroke="#3F5D3A" stroke-width="4" stroke-linecap="round"/>
</g>
  <text x="180" y="96" text-anchor="middle" font-family="'Noto Serif SC',serif" font-size="9" font-style="italic" fill="#3F5D3A" opacity="0.7">fox · bird · tree · octopus</text>
</svg>