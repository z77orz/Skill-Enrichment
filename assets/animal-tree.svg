<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 100 100">
  <!-- Trunk -->
  <rect x="44" y="50" width="12" height="40" fill="#3F5D3A"/>
  <!-- Roots -->
  <path d="M 44 90 Q 30 92 22 88" stroke="#3F5D3A" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 56 90 Q 70 92 78 88" stroke="#3F5D3A" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Healthy branches (left side) -->
  <path d="M 50 50 Q 30 38 18 30" stroke="#3F5D3A" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 50 55 Q 35 55 24 50" stroke="#3F5D3A" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Leaves cluster -->
  <circle cx="20" cy="28" r="8" fill="#3F5D3A" opacity="0.85"/>
  <circle cx="14" cy="34" r="6" fill="#3F5D3A" opacity="0.85"/>
  <circle cx="28" cy="22" r="5" fill="#3F5D3A" opacity="0.85"/>
  <!-- BROKEN branch (right side - jagged, with X) -->
  <path d="M 50 50 Q 72 40 80 28" stroke="#3F5D3A" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 80 28 L 86 24" stroke="#3F5D3A" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Red ✕ on the break (SkillDefect color #8B2C1F) -->
  <line x1="78" y1="32" x2="84" y2="22" stroke="#8B2C1F" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="78" y1="22" x2="84" y2="32" stroke="#8B2C1F" stroke-width="2.5" stroke-linecap="round"/>
</svg>